version: '3.8'

services:
  target-mcp:
    image: python:3.11-slim
    command: python -m http.server 8000
    networks:
      - aegis_secure_net

  aegis-sidecar:
    build: .
    ports:
      - "8080:8080" 
    environment:
      - TARGET_MCP_URL=http://target-mcp:8000
      - AEGIS_CONTROL_PLANE_URL=https://aegis-live-node.onrender.com
      - AEGIS_AGENT_ID=Test1_live_68b171e65a4123bc006a9a252c1bd856 # <--- UPDATE THIS WITH YOUR ACTUAL AGENT ID
      - PYTHONUNBUFFERED=1
    networks:
      - aegis_secure_net
    depends_on:
      - target-mcp

networks:
  aegis_secure_net:
    driver: bridge
