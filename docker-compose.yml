version: '3.8'

services:
  # ----------------------------------------------------
  # 1. THE DUMMY TARGET: Simulating an internal MCP Server
  # ----------------------------------------------------
  target-mcp:
    image: python:3.11-slim
    command: python -m http.server 8000
    # Isolated. No exposed ports.
    networks:
      - aegis_secure_net

  # ----------------------------------------------------
  # 2. THE SHIELD: Aegis Zero-Trust Sidecar
  # ----------------------------------------------------
  aegis-sidecar:
    build: .
    ports:
      - "8080:8080" # All agent traffic must hit the sidecar first
    environment:
      - TARGET_MCP_URL=http://target-mcp:8000
      - AEGIS_CONTROL_PLANE_URL=https://aegis-live-node.onrender.com
      - AEGIS_AGENT_ID=SMTest_live_d886afede083611a3d5e4ac0dc839d88
    networks:
      - aegis_secure_net
    depends_on:
      - target-mcp

networks:
  aegis_secure_net:
    driver: bridge